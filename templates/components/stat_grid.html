    <div class="card text-center">
        <div class="text-2xl font-bold">--</div>
        <div class="text-xs text-[var(--text-muted)]">活跃群组</div>

    <div class="card text-center">
        <div class="text-2xl font-bold">--</div>
        <div class="text-xs text-[var(--text-muted)]">消息总数</div>
    </div>
    <div class="card text-center">
        <div class="text-2xl font-bold">--</div>
        <div class="text-xs text-[var(--text-muted)]">@提及</div>
    </div>
    <div class="card text-center">
        <div class="text-2xl font-bold">--</div>
        <div class="text-xs text-[var(--text-muted)]">沉默群组</div>
    </div>
</div>
