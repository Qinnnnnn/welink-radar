<!-- IntelligenceBrief: dashboard intelligence summary -->
<div id="intelligence-brief" class="card mb-6">
    <h3 class="font-semibold mb-3">📊 今日情报</h3>
    <div id="intelligence-content" hx-get="/api/stats?range=day" hx-trigger="load from:body" hx-swap="innerHTML">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="p-3 rounded-lg bg-orange-50 dark:bg-orange-900/20">
                <div class="text-xs font-semibold text-orange-600 mb-1">🔥 必须关注</div>
                <div id="must-read-list" class="text-sm space-y-1"></div>
            </div>
            <div class="p-3 rounded-lg bg-blue-50 dark:bg-blue-900/20">
                <div class="text-xs font-semibold text-blue-600 mb-1">💡 机会信号</div>
                <div id="opportunities-list" class="text-sm space-y-1"></div>
            </div>
            <div class="p-3 rounded-lg bg-green-50 dark:bg-green-900/20">
                <div class="text-xs font-semibold text-green-600 mb-1">📋 行动项</div>
                <div id="action-items-list" class="text-sm space-y-1"></div>
            </div>
            <div class="p-3 rounded-lg bg-purple-50 dark:bg-purple-900/20">
                <div class="text-xs font-semibold text-purple-600 mb-1">👤 人物雷达</div>
                <div id="people-radar-list" class="text-sm space-y-1"></div>
            </div>
        </div>
    </div>
</div>
