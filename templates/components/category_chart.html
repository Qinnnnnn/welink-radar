<!-- CategoryChart: group category distribution -->
<div class="card mb-6">
    <h3 class="font-semibold mb-3">📊 群组分类分布</h3>
    <div id="category-chart" style="height: 250px;"></div>
    <script>
    (function() {
        const el = document.getElementById('category-chart');
        if (!el) return;
        fetch('/api/stats?range=week')
            .then(r => r.json())
            .then(data => {
                const chart = echarts.init(el);
                chart.setOption({
                    tooltip: { trigger: 'item' },
                    series: [{
                        type: 'pie',
                        radius: ['40%', '70%'],
                        data: data.categories.map(c => ({ name: c.name, value: c.count })),
                        label: { formatter: '{b}\n{d}%' },
                    }],
                });
            });
    })();
    </script>
</div>
