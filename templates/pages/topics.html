<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeLink Radar — 话题雷达</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<link rel="stylesheet" href="/static/css/style.css">
<style>
:root{--bg:#faf9f6;--bg-card:#fff;--bg-sidebar:#f5f4f1;--text:#1a1a1a;--text-muted:#6b7280;--border:#e5e7eb;--accent:#6366f1}
[data-theme=dark]{--bg:#1a1a2e;--bg-card:#16213e;--bg-sidebar:#0f3460;--text:#e0e0e0;--text-muted:#9ca3af;--border:#374151;--accent:#818cf8}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,sans-serif}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:1rem}
.btn{padding:.5rem 1rem;border-radius:8px;font-weight:500;cursor:pointer;border:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
.sidebar{background:var(--bg-sidebar);border-right:1px solid var(--border)}
.topbar{background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.5rem;height:3.5rem}
</style>
</head>
<body class="min-h-screen flex">
{% include "components/sidebar.html" %}
<div class="flex-1 flex flex-col min-h-screen">
<header class="topbar gap-4"><h2 class="font-semibold">🎯 话题雷达</h2>
<input type="date" id="topics-date" class="px-3 py-2 rounded-lg border border-[var(--border)] bg-[var(--bg)] text-sm" onchange="loadTopics(this.value)">
<button class="btn btn-primary text-sm" onclick="buildTopics()">🤖 AI 生成话题</button>
<span id="build-status" class="text-xs text-[var(--text-muted)]"></span></header>
<main class="flex-1 p-6 overflow-auto">
<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
<div class="lg:col-span-1"><div class="card"><h3 class="font-semibold mb-3">话题列表</h3>
<div id="topics-list" hx-get="/api/topics" hx-trigger="load" hx-swap="innerHTML"><div class="text-sm text-[var(--text-muted)]">加载话题...</div></div></div></div>
<div class="lg:col-span-2"><div class="card"><h3 class="font-semibold mb-3">话题详情</h3>
<div id="topic-detail"><p class="text-sm text-[var(--text-muted)]">← 选择一个话题查看详情</p></div></div></div>
</div>
<script>
function loadTopics(date){const p=new URLSearchParams();if(date)p.set('date',date);htmx.ajax('GET','/api/topics?'+p.toString(),'#topics-list');}
function buildTopics(){const b=event.target;b.disabled=true;b.textContent='⏳ 生成中...';const d=document.getElementById('topics-date').value;const p=new URLSearchParams();if(d)p.set('date',d);const s=new EventSource('/api/topics/build?'+p.toString());s.onmessage=(e)=>{const data=JSON.parse(e.data);if(data.topics){document.getElementById('build-status').textContent='✅ 生成了 '+data.topics.length+' 个话题';loadTopics(d);s.close();b.disabled=false;b.textContent='🤖 AI 生成话题';}};s.onerror=()=>{s.close();b.disabled=false;b.textContent='🤖 AI 生成话题';};}
</script>
</main></div>
</body></html>
