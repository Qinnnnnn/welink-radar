<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeLink Radar — 群组详情</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<link rel="stylesheet" href="/static/css/style.css">
<style>
:root{--bg:#faf9f6;--bg-card:#fff;--bg-sidebar:#f5f4f1;--text:#1a1a1a;--text-muted:#6b7280;--border:#e5e7eb;--accent:#6366f1;--accent-hover:#4f46e5}
[data-theme=dark]{--bg:#1a1a2e;--bg-card:#16213e;--bg-sidebar:#0f3460;--text:#e0e0e0;--text-muted:#9ca3af;--border:#374151;--accent:#818cf8;--accent-hover:#6366f1}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,sans-serif}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:1rem}
.btn{padding:.5rem 1rem;border-radius:8px;font-weight:500;cursor:pointer;border:none;transition:.2s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-hover)}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
.sidebar{background:var(--bg-sidebar);border-right:1px solid var(--border)}
.topbar{background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.5rem;height:3.5rem}
</style>
</head>
<body class="min-h-screen flex">
{% include "components/sidebar.html" %}
<div class="flex-1 flex flex-col min-h-screen">
{% include "components/topbar.html" %}
<main class="flex-1 p-6 overflow-auto">
<div class="max-w-4xl mx-auto">
<div id="group-detail" hx-get="/api/group/{{ conv_id }}" hx-trigger="load" hx-swap="innerHTML">
<div class="text-sm text-[var(--text-muted)]">加载中...</div></div>
<div class="card mt-6"><h3 class="font-semibold mb-3">⏰ 小时分布</h3><div id="hourly-chart" style="height:200px"></div></div>
<div class="card mt-6"><h3 class="font-semibold mb-3">📅 每日历史</h3><div id="daily-chart" style="height:200px"></div></div>
<div class="card mt-6"><div class="flex justify-between items-center mb-3"><h3 class="font-semibold">💬 消息列表</h3>
<button class="btn btn-ghost text-xs" onclick="navigator.clipboard.writeText(document.getElementById('msg-copy-target').innerText)">📋 复制</button></div>
<div id="messages-container" class="space-y-2 max-h-96 overflow-y-auto"><div id="msg-copy-target"></div></div></div>
<div class="mt-4 text-right"><a href="/reports/groups/{{ conv_id }}" class="btn btn-ghost text-sm">📝 生成日报</a></div>
</div>
</main></div>
</body></html>
