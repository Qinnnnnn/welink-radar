<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeLink Radar · 设置</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    {% include "components/shared_layout.html" %}
    <style>
        .setup-panel { max-width:600px; }
        .status-tag {
            font-size:0.7rem; font-weight:500; padding:0.1rem 0.5rem; border-radius:10px;
            display:inline-flex; align-items:center; gap:0.25rem;
        }
        .status-tag.ready { background:#ECFDF5; color:#10B981; }
        .status-tag.missing { background:#FEF2F2; color:#EF4444; }
        .status-tag::before {
            content:''; width:5px; height:5px; border-radius:50%;
        }
        .status-tag.ready::before { background:#10B981; }
        .status-tag.missing::before { background:#EF4444; }
        .setup-divider { border:none; border-top:1px solid #F1F5F9; margin:1.5rem 0 1.25rem 0; }
        .setup-input {
            background:#FFF; border:1px solid #CBD5E1; border-radius:6px;
            height:38px; padding:0 0.7rem; font-size:0.84rem; color:var(--text);
            width:100%; outline:none; transition:border-color 0.15s,box-shadow 0.15s;
        }
        .setup-input:focus { border-color:#5B6AF0; box-shadow:0 0 0 3px rgba(91,106,240,0.1); }
        .setup-input::placeholder { color:#94A3B8; }
        .setup-btn {
            height:38px; padding:0 1.2rem; border-radius:6px; font-weight:500;
            font-size:0.85rem; cursor:pointer; border:none; transition:background 0.15s;
            background:var(--accent); color:#FFF; min-width:110px;
        }
        .setup-btn:hover { background:var(--accent-hover); }
    </style>
</head>
<body>
    {% with page="setup" %}{% include "components/sidebar_minimal.html" %}{% endwith %}

    <div class="main-area">
        <div class="topbar">
            <a href="/digest" class="topbar-root">WeLink Radar</a>
            <span class="topbar-sep">/</span>
            <span class="topbar-current">设置</span>
        </div>
        <div class="content">
            <div class="setup-panel">
                <div class="card">

                    <div style="font-size:0.82rem;font-weight:600;color:var(--text);margin-bottom:0.75rem;">运行环境</div>
                    <div style="display:flex;align-items:center;gap:2.5rem;">
                        <div style="display:flex;align-items:center;gap:0.35rem;font-size:0.81rem;">
                            <span style="color:var(--text);">welink-cli</span>
                            <span class="status-tag {{ 'ready' if env_checks.welink_cli_available else 'missing' }}">
                                {{ '已就绪' if env_checks.welink_cli_available else '未安装' }}
                            </span>
                        </div>
                        <div style="display:flex;align-items:center;gap:0.35rem;font-size:0.81rem;">
                            <span style="color:var(--text);">nga</span>
                            <span class="status-tag {{ 'ready' if env_checks.nga_available else 'missing' }}">
                                {{ '已就绪' if env_checks.nga_available else '未安装' }}
                            </span>
                        </div>
                    </div>

                    <hr class="setup-divider">

                    <form hx-post="/api/setup" hx-swap="outerHTML" style="max-width:440px;">
                        <label style="display:block;font-size:0.82rem;font-weight:500;color:var(--text);margin-bottom:0.45rem;">
                            WeLink 短工号
                        </label>
                        <input name="myNicknames" type="text" class="setup-input" placeholder="例如 q00510847">
                        <p style="font-size:0.7rem;color:var(--muted);margin-top:0.35rem;">
                            用于匹配群聊及私聊中提及你的消息
                        </p>
                        <button type="submit" class="setup-btn" style="margin-top:1.5rem;">完成配置</button>
                    </form>

                </div>
            </div>
        </div>
    </div>
</body>
</html>
