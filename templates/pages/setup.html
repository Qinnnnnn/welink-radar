<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeLink Radar · 设置</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    {% include "components/shared_layout.html" %}
</head>
<body>
    {% with page="setup" %}{% include "components/sidebar_minimal.html" %}{% endwith %}

    <div class="main-area">
        <div class="topbar">
            <a href="/digest" class="topbar-root">WeLink Radar</a>
            <span class="topbar-sep">/</span>
            <span class="topbar-current">设置</span>
        </div>
        <div class="content" style="display:flex;align-items:center;justify-content:center;">
            <div style="width: 440px; max-width: 100%;">

                <div class="card" style="margin-bottom: 1rem;">
                    <div style="font-size:0.8rem;font-weight:600;color:var(--text);margin-bottom:0.85rem;">运行环境</div>
                    <div style="display:flex;flex-direction:column;gap:0.6rem;">
                        <div style="display:flex;align-items:center;gap:0.6rem;font-size:0.85rem;">
                            <span style="width:7px;height:7px;border-radius:50%;background:{{ '#22A699' if env_checks.welink_cli_available else '#E85D5D' }};flex-shrink:0;"></span>
                            <span style="color:var(--text);">welink-cli</span>
                            <span style="margin-left:auto;font-size:0.78rem;color:{{ '#22A699' if env_checks.welink_cli_available else '#E85D5D' }};">
                                {{ '已安装' if env_checks.welink_cli_available else '未安装' }}
                            </span>
                        </div>
                        <div style="display:flex;align-items:center;gap:0.6rem;font-size:0.85rem;">
                            <span style="width:7px;height:7px;border-radius:50%;background:{{ '#22A699' if env_checks.nga_available else '#E85D5D' }};flex-shrink:0;"></span>
                            <span style="color:var(--text);">nga</span>
                            <span style="margin-left:auto;font-size:0.78rem;color:{{ '#22A699' if env_checks.nga_available else '#E85D5D' }};">
                                {{ '已安装' if env_checks.nga_available else '未安装' }}
                            </span>
                        </div>
                    </div>
                </div>

                <form hx-post="/api/setup" hx-swap="outerHTML" class="card" style="display:flex;flex-direction:column;gap:1.1rem;">
                    <div>
                        <label style="display:block;font-size:0.82rem;font-weight:500;color:var(--text);margin-bottom:0.45rem;">
                            WeLink 短工号
                        </label>
                        <input name="myNicknames" type="text" placeholder="例如 q00510847">
                        <p style="font-size:0.72rem;color:var(--muted);margin-top:0.4rem;">
                            用于匹配群聊及私聊中提及你的消息
                        </p>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%;">完成配置</button>
                </form>

            </div>
        </div>
    </div>
</body>
</html>
