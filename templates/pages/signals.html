<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeLink Radar — 实时信号</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<link rel="stylesheet" href="/static/css/style.css">
<style>
:root{--bg:#faf9f6;--bg-card:#fff;--bg-sidebar:#f5f4f1;--text:#1a1a1a;--text-muted:#6b7280;--border:#e5e7eb;--accent:#6366f1}
[data-theme=dark]{--bg:#1a1a2e;--bg-card:#16213e;--bg-sidebar:#0f3460;--text:#e0e0e0;--text-muted:#9ca3af;--border:#374151;--accent:#818cf8}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,sans-serif}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:1rem}
.btn{padding:.5rem 1rem;border-radius:8px;font-weight:500;cursor:pointer;border:none}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
.sidebar{background:var(--bg-sidebar);border-right:1px solid var(--border)}
.topbar{background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.5rem;height:3.5rem}
</style>
</head>
<body class="min-h-screen flex">
{% include "components/sidebar.html" %}
<div class="flex-1 flex flex-col min-h-screen">
<header class="topbar gap-4"><h2 class="font-semibold">📶 实时信号</h2>
<button class="btn btn-ghost text-sm" id="pause-btn" onclick="toggleStream()">⏸️ 暂停</button>
<span id="stream-status" class="text-xs text-[var(--text-muted)]">🟢 监听中...</span></header>
<main class="flex-1 p-6 overflow-auto">
<div class="card"><div id="signal-stream" class="space-y-3 max-h-[70vh] overflow-y-auto"><div class="text-sm text-[var(--text-muted)]">等待新消息...</div></div></div>
<script>
let es=null,paused=false;
function startStream(){es=new EventSource('/api/new-messages?interval=5000');es.onmessage=(e)=>{const d=JSON.parse(e.data);if(d.type==='messages'&&d.items){const c=document.getElementById('signal-stream');if(c.querySelector('.text-muted'))c.innerHTML='';d.items.forEach(item=>{const div=document.createElement('div');div.className='p-3 rounded-lg bg-[var(--bg-sidebar)] border border-[var(--border)] text-sm';div.innerHTML='<span class=\"text-xs text-[var(--accent)]\">'+(item.conversation_name||item.conversation_id)+'</span> <span class=\"text-xs text-[var(--text-muted)] ml-2\">'+item.sender+'</span><p class=\"mt-1\">'+item.content+'</p>';c.insertBefore(div,c.firstChild);});}};es.onerror=()=>{document.getElementById('stream-status').textContent='🔴 断开，重试中...';};}
function toggleStream(){const b=document.getElementById('pause-btn');if(paused){b.textContent='⏸️ 暂停';document.getElementById('stream-status').textContent='🟢 监听中...';startStream();paused=false;}else{b.textContent='▶️ 继续';document.getElementById('stream-status').textContent='⏸️ 已暂停';if(es)es.close();paused=true;}}
startStream();
</script>
</main></div>
</body></html>
